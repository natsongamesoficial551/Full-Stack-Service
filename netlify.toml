[build]
  publish = "/"
  command = "sed -i \"s|%%SUPABASE_URL%%|$SUPABASE_URL|g\" config.js && sed -i \"s|%%SUPABASE_ANON_KEY%%|$SUPABASE_ANON_KEY|g\" config.js"

[build.environment]
SECRETS_SCAN_ENABLED = "false"

# Ping automático ao Supabase a cada 10 minutos para evitar hibernação
[[scheduled-functions]]
  name = "ping-supabase"
  cron = "*/10 * * * *"
